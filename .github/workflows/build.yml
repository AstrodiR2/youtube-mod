name: Сборка YouTube Мода

on:
  workflow_dispatch:
    inputs:
      yt_version:
        description: 'Версия YouTube (например 21.20.404)'
        required: false
        default: 'latest'

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GOOGLE_LOGIN: ${{ secrets.GOOGLE_LOGIN }}
      GOOGLE_PASSWORD: ${{ secrets.GOOGLE_PASSWORD }}
    steps:
      - name: Получение кода
        uses: actions/checkout@v4

      - name: Установка Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Установка apktool
        run: |
          wget -q https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar -O /usr/local/bin/apktool.jar
          wget -q https://raw.githubusercontent.com/iBotPeaches/Apktool/master/scripts/linux/apktool -O /usr/local/bin/apktool
          chmod +x /usr/local/bin/apktool
          apktool --version

      - name: Скачивание YouTube APK
        run: bash scripts/download_yt.sh ${{ github.event.inputs.yt_version }}

      - name: Декомпиляция
        run: apktool d youtube.apk -o youtube_decompiled -f

      - name: Применение патчей
        run: bash scripts/apply_patches.sh

      - name: Перекомпиляция
        run: apktool b youtube_decompiled -o youtube_modded_unsigned.apk

      - name: Подпись APK
        run: bash scripts/sign.sh

      - name: Загрузка артефакта
        uses: actions/upload-artifact@v4
        with:
          name: youtube-modded
          path: youtube_modded.apk
